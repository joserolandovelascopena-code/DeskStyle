<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agregar al Carrito - DeskStyle</title>
    <link rel="icon" href="../icons/favicon.png" type="image/png" />
    <link rel="stylesheet" href="../css/utils.css/header_footer.css" />
    <link rel="stylesheet" href="../css/carrito.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
  </head>
  <body>
    <div class="main_container">
      <hearder class="nav_menu">
        <ul class="menu_social">
          <li class="opccion_social">
            <span class="material-symbols-outlined"> sync </span> Devoluciones
            fáciles y rápidas
          </li>
          <li class="opccion_social">
            <span class="material-symbols-outlined"> support_agent </span>
            Atención al cliente
          </li>
          <li class="opccion_social">
            <i class="fa-brands fa-whatsapp"></i>
            WhatsApp
          </li>
          <li class="opccion_social">
            <span class="material-symbols-outlined"> mail </span> Correo
          </li>
        </ul>
        <div class="barra_de_opciones">
          <div class="logo">
            <img src="./public/icons/logo.png" alt="logo_store" />
          </div>
          <div class="buscador_productos">
            <div id="conten_Buscador" for="buscador">
              <input
                type="search"
                placeholder="Busca en DeskStyle"
                id="buscador"
              />
              <button class="btnBuscador">
                <span class="material-symbols-outlined"> search </span>
              </button>
            </div>
          </div>
          <div class="opciones_bar">
            <div class="opccionBar">
              <i class="fa-regular fa-user"></i>
              <p>Cuenta</p>
            </div>
            <div class="opccionBar">
              <span class="material-symbols-outlined"> favorite </span>
              <p>Mis favoritos</p>
            </div>
            <div class="opccionBar">
              <div class="addCar">
                <span class="material-symbols-outlined" id="car">
                  shopping_cart
                </span>
                <div style="display: none" class="addCar_Cant">0</div>
              </div>
              <p>Carrito</p>
            </div>
          </div>
        </div>
        <nav class="menu_paginas">
          <ul>
            <li class="opcio_selector">
              <button id="btn_categorias">
                <span class="material-symbols-outlined"> menu_open </span>
                Categorias
              </button>
            </li>
            <li class="opcio_selector">
              <a href="#" class="pag_Inicio">Inicio</a>
            </li>
            <li class="opcio_selector">
              <a href="#" class="pag_Productos">Productos</a>
            </li>
            <li class="opcio_selector">
              <a href="#" class="pag_Novedades select">Novedades</a>
            </li>
            <li class="opcio_selector">
              <a href="#" class="pag_Ofertas">Ofertas</a>
            </li>
            <li class="opcio_selector">
              <a href="#" class="pag_Sobre">Sobre nosotros</a>
            </li>
            <li class="opcio_selector">
              <a href="#" class="pag_Atencion">Más información</a>
            </li>
          </ul>
        </nav>
      </hearder>
      <section class="car_shopping">
        <div class="ruta_ubicacion">
          <p class="pagina_posicion">Incicio</p>
          <p class="categoria_selec">figuras</p>
          <p class="product_selec">Izuku Midoriya</p>
        </div>
      </section>
      <footer class="footer_pag"></footer>
    </div>
  </body>
</html>
